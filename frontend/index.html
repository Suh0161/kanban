<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />

    <title>Elevate</title>
    <meta name="description" content="A dark-themed Kanban and planning workspace." />

    <!-- Favicon + platform shortcut icons. The SVG works on all modern
         browsers and scales without rasterizing. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#582af5" />

    <!-- Open Graph / link previews. Safe defaults; no remote URL is
         baked in so a deployed instance can override at the proxy layer
         if it wants richer cards. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Elevate" />
    <meta property="og:description" content="A dark-themed Kanban and planning workspace." />
    <meta property="og:image" content="/favicon.svg" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Elevate" />
    <meta name="twitter:description" content="A dark-themed Kanban and planning workspace." />
    <meta name="twitter:image" content="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
