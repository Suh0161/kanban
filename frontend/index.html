<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />

    <!-- ── SEO ────────────────────────────────────────────────────────── -->
    <!-- Title: 56 chars. Stays under the 60-char ceiling Google truncates at. -->
    <title>Elevate · Kanban and planning workspace for teams</title>

    <!-- Description: 159 chars. Concrete features (Kanban, backlog, REST
         API, webhooks) help search engines match real intent. -->
    <meta
      name="description"
      content="A planning workspace for engineering teams. Kanban boards, sprint backlog, personal queues, role-based access, and a REST API with signed webhooks."
    />
    <meta
      name="keywords"
      content="kanban board, project management, sprint planning, backlog, task tracker, team collaboration, REST API, webhooks, OAuth, self-hosted, open API"
    />
    <meta name="author" content="Elevate" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://app.arcnvd.com/" />

    <!-- ── Favicon + shortcut icons ──────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#582af5" />

    <!-- ── Open Graph (Facebook, LinkedIn, Slack, Discord previews) ──── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Elevate" />
    <meta property="og:url" content="https://app.arcnvd.com/" />
    <meta
      property="og:title"
      content="Elevate · Kanban and planning workspace for teams"
    />
    <meta
      property="og:description"
      content="A planning workspace for engineering teams. Kanban boards, sprint backlog, personal queues, role-based access, and a REST API with signed webhooks."
    />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:image:alt" content="Elevate logo" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X cards ─────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Elevate · Kanban and planning workspace for teams"
    />
    <meta
      name="twitter:description"
      content="A planning workspace for engineering teams. Kanban boards, sprint backlog, personal queues, role-based access, and a REST API with signed webhooks."
    />
    <meta name="twitter:image" content="/favicon.svg" />
    <meta name="twitter:image:alt" content="Elevate logo" />

    <!-- ── JSON-LD: helps search engines render a richer result card ─── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Elevate",
        "description": "A planning workspace for engineering teams. Kanban boards, sprint backlog, personal queues, role-based access, and a REST API with signed webhooks.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
