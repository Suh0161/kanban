<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- theme-color: static dark default for first paint. Not using media=(prefers-color-scheme)
         because the site persists an explicit user choice (localStorage), not system preference.
         The boot script below updates this meta when a stored theme is found. -->
    <meta name="theme-color" content="#000000" />
    <!-- FOUC-prevention boot — keep in sync with public/theme-boot.js and src/theme/theme.js -->
    <script src="/theme-boot.js"></script>

    <title>Elevate — Team workspace for planning and delivery</title>
    <meta name="description" content="Plan, track, and ship work from one workspace. Boards, backlog, team views, and a REST API with webhooks." />

    <link rel="icon" type="image/png" href="/elevate-favicon-pixel.png" />
    <link rel="icon" type="image/svg+xml" href="/elevate.svg" />
    <link rel="apple-touch-icon" href="/elevate-logo-pixel.png" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Elevate" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:title" content="Elevate — Team workspace for planning and delivery" />
    <meta property="og:description" content="Plan, track, and ship work from one workspace. Boards, backlog, team views, and a REST API with webhooks." />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Elevate — Team workspace for planning and delivery" />
    <meta name="twitter:description" content="Plan, track, and ship work from one workspace. Boards, backlog, team views, and a REST API with webhooks." />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
