# fly.toml app configuration file generated for kanban-elevate on 2026-05-17T15:33:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kanban-elevate'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  AUDIT_LOG_ENABLED = 'true'
  DB_PATH = '/data/elevate.db'
  NODE_ENV = 'production'
  PORT = '3001'
  # Avatars, workspace logos/backgrounds, attachments. The local-disk
  # storage backend writes here. /data is the persistent Fly volume, so
  # uploads survive redeploys. If we ever switch to STORAGE_BACKEND=supabase
  # this can stay set — it's only read by the local backend.
  UPLOADS_DIR = '/data/uploads'

[[mounts]]
  source = 'elevate_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  # Stateful app with a SQLite volume — keep at least one machine warm so
  # the proxy doesn't try to wake a stopped instance and lose first-hit
  # latency. Also avoids the corner case where Fly reschedules a stopped
  # machine in a way that leaves the volume unattached.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
